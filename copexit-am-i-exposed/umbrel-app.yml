name: "am-i.exposed"
version: "0.26.0"
tagline: Bitcoin privacy scanner - see what the blockchain reveals about you
description: >-
  Paste a Bitcoin address or transaction ID and get a privacy score from 0 to 100
  with actionable findings. The engine runs 36+ heuristics covering address reuse,
  change detection, CoinJoin detection (Whirlpool, WabiSabi, JoinMarket), script
  type analysis, timing patterns, wallet fingerprinting, chain analysis, entity
  proximity detection, and more.


  All analysis runs client-side in your browser. API calls go directly to your
  local Umbrel mempool instance - no data leaves your network. No tracking,
  no logging, no third-party analytics.


  Requires the Mempool app to be installed.
releaseNotes: >-
  Massive entity filter expansion - curated exchange addresses grew from ~800
  to 76,000+ across 90 exchange entities. Sources include Arkham Intelligence,
  WalletExplorer deep scraping, Figshare academic dataset, OFAC/OpenSanctions,
  and CoinCarp. New coverage for FTX, Garantex, Gemini, Cash App, WazirX,
  ChangeNOW, Galaxy Digital, and many more. IndexedDB analysis cache with
  TTL and LRU eviction. Mempool connectivity detection. 780+ tests passing.
